# MT6359 PMIC codec — headphone output mixer path for EgePod.
#
# These controls are applied by alsa_out.c at pcm_open() time.
# The file is here for reference and for the alsa_configure.sh script.
#
# Format: <mixer_control_name> = <value>
# For enum controls, value is the string name of the enum option.

# Headphone amplifier
Headphone Switch        = 1
Audio_Amp_R_Switch      = 1
Audio_Amp_L_Switch      = 1

# Route DAC output to HP left/right
HPL Mux                 = Audio Playback
HPR Mux                 = Audio Playback

# Enable the DAC output switches
DAC R2 Switch           = 1
DAC L2 Switch           = 1

# HP output selector
HPOUT_L_SEL             = 1
HPOUT_R_SEL             = 1

# Volume: 14/15 ~ -6 dBFS — avoids clipping on high-sensitivity IEMs
Headphone Volume        = 14

# Mute speaker (not needed for HP-only DAP)
Speaker Switch          = 0

# Ensure no loopback / sidetone
Sidetone Switch         = 0
